<!DOCTYPE html>
<html>
<head>
    <title>Prediction Result</title>

    <style>

        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
            url('https://images.unsplash.com/photo-1500937386664-56d1dfef3854') no-repeat center center/cover;
            color: white;
        }
        
        .container {
            width: 700px;
            margin: auto;
            margin-top: 40px;
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(12px);
        }

        img {
            width: 300px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        
        h1 {
            color: #5aff15;
        }

        .card {
            background: rgba(255,255,255,0.08);
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
        }

        a {
            text-decoration: none;
            background: green;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            display: inline-block;
            margin-top: 20px;
        }

    </style>

</head>
<body>

<div class="container">

    <h1>AI Crop Disease Result</h1>

    <center>
        <img src="/{{ image_path }}">
    </center>

    <div class="card">
        <h2>Disease: {{ disease }}</h2>
        <h3>Confidence: {{ confidence }}%</h3>
        <h3>Severity Level: {{ severity }}</h3>
    </div>

    <div class="card">
        <h3>Cause</h3>
        <p>{{ cause }}</p>
    </div>

    <div class="card">
        <h3>Symptoms</h3>
        <p>{{ symptoms }}</p>
    </div>

    <div class="card">
        <h3>Treatment Recommendation</h3>
        <p>{{ treatment }}</p>
    </div>

    <div class="card">
        <h3>Prevention</h3>
        <p>{{ prevention }}</p>
    </div>

    <a href="/">Upload Another Image</a>

</div>

</body>
</html>
