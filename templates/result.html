<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Prediction Result</title>

    <link rel="preconnect"
    href="https://fonts.googleapis.com">

    <link rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Poppins', sans-serif;

    min-height:100vh;

    background:
    linear-gradient(
        rgba(0,0,0,0.65),
        rgba(0,0,0,0.65)
    ),

    url("https://images.unsplash.com/photo-1501004318641-b39e6451bec6?q=80&w=2070&auto=format&fit=crop")
    no-repeat center center fixed;

    background-size:cover;

    color:white;

    padding:40px;
}

.main-container{

    max-width:1200px;

    margin:auto;
}

.title{

    text-align:center;

    font-size:48px;

    margin-bottom:40px;

    color:#9cff57;

    text-shadow:0 0 20px rgba(0,0,0,0.5);
}

.top-section{

    display:flex;

    gap:30px;

    flex-wrap:wrap;

    justify-content:center;

    align-items:flex-start;
}

.image-card{

    width:380px;

    background:rgba(255,255,255,0.08);

    border-radius:25px;

    overflow:hidden;

    backdrop-filter:blur(10px);

    box-shadow:0 0 25px rgba(0,0,0,0.4);
}

.image-card img{

    width:100%;

    height:350px;

    object-fit:cover;
}

.result-summary{

    flex:1;

    min-width:350px;

    background:rgba(255,255,255,0.08);

    padding:30px;

    border-radius:25px;

    backdrop-filter:blur(10px);

    box-shadow:0 0 25px rgba(0,0,0,0.4);
}

.result-summary h2{

    margin-bottom:20px;

    color:#8cff00;

    font-size:34px;
}

.result-summary p{

    font-size:22px;

    line-height:1.8;
}

.cards{

    margin-top:40px;

    display:grid;

    grid-template-columns:
    repeat(auto-fit, minmax(300px,1fr));

    gap:25px;
}

.card{

    background:rgba(255,255,255,0.08);

    padding:30px;

    border-radius:25px;

    backdrop-filter:blur(10px);

    transition:0.4s;

    box-shadow:0 0 25px rgba(0,0,0,0.3);
}

.card:hover{

    transform:translateY(-8px);

    background:rgba(255,255,255,0.12);
}

.card h3{

    color:#9cff57;

    margin-bottom:15px;

    font-size:28px;
}

.card p{

    font-size:20px;

    line-height:1.8;
}

.button-section{

    margin-top:40px;

    display:flex;

    justify-content:center;

    gap:20px;

    flex-wrap:wrap;
}

.btn{

    padding:16px 35px;

    border:none;

    border-radius:15px;

    text-decoration:none;

    color:white;

    font-size:20px;

    font-weight:600;

    transition:0.4s;

    cursor:pointer;
}

.upload-btn{

    background:linear-gradient(
        45deg,
        #00c853,
        #64dd17
    );
}

.stop-btn{

    background:linear-gradient(
        45deg,
        #ff1744,
        #ff5252
    );
}

.btn:hover{

    transform:scale(1.05);
}

@media(max-width:768px){

    .title{
        font-size:34px;
    }

    .result-summary p,
    .card p{
        font-size:18px;
    }
}

</style>

</head>

<body>

<div class="main-container">

    <h1 class="title">
         Crop Disease Detection Result
    </h1>

    <div class="top-section">

        <div class="image-card">

            <img src="{{ image_path }}"
            alt="Crop Image">

        </div>

        <div class="result-summary">

            <h2>{{ disease }}</h2>

            <p>
                <strong>Confidence:</strong>
                {{ confidence }}%
            </p>

            <p>
                <strong>Severity Level:</strong>
                {{ severity }}
            </p>

        </div>

    </div>

    <div class="cards">

        <div class="card">
            <h3>Cause</h3>
            <p>{{ cause }}</p>
        </div>

        <div class="card">
            <h3>Symptoms</h3>
            <p>{{ symptoms }}</p>
        </div>

        <div class="card">
            <h3>Treatment</h3>
            <p>{{ treatment }}</p>
        </div>

        <div class="card">
            <h3>Prevention</h3>
            <p>{{ prevention }}</p>
        </div>

    </div>

    <div class="button-section">

        <a href="/"
        class="btn upload-btn">

            Upload Another Image

        </a>

        <button onclick="stopVoice()"
        class="btn stop-btn">

            Stop Voice Assistant

        </button>

    </div>

</div>

<script>

window.onload = function(){

    let message = new SpeechSynthesisUtterance(

        "Detected disease is {{ disease }}. " +

        "Confidence level is {{ confidence }} percent. " +

        "Cause: {{ cause }}. " +

        "Symptoms: {{ symptoms }}. " +

        "Treatment recommendation: {{ treatment }}. " +

        "Prevention method: {{ prevention }}."

    );

    message.rate = 1;

    speechSynthesis.speak(message);
}

function stopVoice(){

    speechSynthesis.cancel();
}

</script>

</body>
</html>
