<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Crop Disease Detection</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

    <div class="overlay">

        <div class="container">

            <div class="logo">
                🌾
            </div>

            <h1>
                 Crop Disease Detection
            </h1>

            <p>
                Smart Deep Learning System for Wheat and Maize Disease Prediction
            </p>

            <form action="/predict"
            method="POST"
            enctype="multipart/form-data">

                <input type="file"
                name="image"
                required>

                <button type="submit">
                    Predict Disease
                </button>

            </form>

            <button class="voice-btn"
            onclick="speakMessage()">
                🔊 Voice Assistant
            </button>

            <div class="features">

                <div class="feature-card">
                    <h3>🌿 Wheat Disease</h3>
                    <p>Detect Rust, Septoria, Leaf Blight and More</p>
                </div>

                <div class="feature-card">
                    <h3>🌽 Maize Disease</h3>
                    <p>Identify Common Rust and Blight Instantly</p>
                </div>

            </div>

        </div>

    </div>

<script>

function speakMessage(){

    let message = new SpeechSynthesisUtterance(
        "Welcome to Crop Disease Detection System. Upload a Wheat or Maize crop image to predict diseases using Deep Learning technology."
    );

    message.rate = 1;
    message.pitch = 1;
    message.volume = 1;

    speechSynthesis.speak(message);
}

window.onload = function(){

    let welcome = new SpeechSynthesisUtterance(
        " Crop Disease Detection System Loaded Successfully"
    );

    welcome.rate = 1;

    speechSynthesis.speak(welcome);
}

</script>

</body>
</html>
